name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          SHARE_TOKEN: test-token
          ROOM_NAME: Test Room
          PORT: '3001'

      - name: Build project
        run: npm run build
        env:
          SHARE_TOKEN: test-token
          ROOM_NAME: Test Room
          PORT: '3001'

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: jt-mp3:latest
          load: true

  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SHARE_TOKEN: test-token
          ROOM_NAME: Test Room
          PORT: '3001'

      - name: Check bundle size
        run: |
          SIZE=$(du -s dist | cut -f1)
          echo "Bundle size: $SIZE KB"
          if [ "$SIZE" -gt 500000 ]; then
            echo "Bundle too large ( > 500KB)"
            exit 1
          fi