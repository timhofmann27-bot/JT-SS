services:
  app:
    build: .
    container_name: jt-ss-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      MEDIA_DIR: /data/media
      DATA_DIR: /data/state
      VITE_API_BASE: /api
    volumes:
      - ./data/media:/data/media
      - ./data/state:/data/state
      - /tmp/youtube_cookies.txt:/tmp/youtube_cookies_src.txt:ro
    networks:
      - caddy
    healthcheck:
      test: ["CMD", "node", "-e", "http.get('http://127.0.0.1:'+(process.env.PORT||3001)+'/api/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
networks:
  caddy:
    external: true
