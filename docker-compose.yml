services:
  jt-mp3:
    build: .
    container_name: jt-mp3
    restart: unless-stopped
    environment:
      - SHARE_TOKEN=${SHARE_TOKEN}
      - ROOM_NAME=${ROOM_NAME}
      - MAX_PEERS=${MAX_PEERS}
      - PORT=${PORT}
      - MEDIA_DIR=${MEDIA_DIR}
      - DATA_DIR=${DATA_DIR}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE}
    ports:
      - "3001:3001"
    volumes:
      - ./media:/data/media
      - ./data:/data/state
