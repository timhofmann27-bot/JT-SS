services:
  jt-mp3:
    build: .
    container_name: jt-mp3
    restart: unless-stopped
    environment:
      SHARE_TOKEN: "change-me-local-room-key"
      ROOM_NAME: "JT-MP3 Privat"
      MAX_PEERS: "50"
      PORT: "3001"
      MEDIA_DIR: "/data/media"
      DATA_DIR: "/data/state"
    ports:
      - "3001:3001"
    volumes:
      - ./media:/data/media
      - ./data:/data/state
